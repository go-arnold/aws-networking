AWSTemplateFormatVersion: "2010-09-09"
Description: >
  One-time bootstrap: creates the two IAM roles required before a
  CloudFormation Git sync configuration for everything to work

Resources:
  GitSyncConnectionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: iam-lab-gitsync-connection-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.sync.codeconnections.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: GitSyncConnectionPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: SyncToCloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStacks
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:GetTemplate
                  - cloudformation:ListChangeSets
                  - cloudformation:ListStacks
                  - cloudformation:ValidateTemplate
                Resource: "*"
              - Sid: PolicyForManagedRules
                Effect: Allow
                Action:
                  - events:PutRule
                  - events:PutTargets
                Resource: "*"
                Condition:
                  StringEquals:
                    events:ManagedBy: cloudformation.sync.codeconnections.amazonaws.com
              - Sid: PolicyForDescribingRule
                Effect: Allow
                Action: events:DescribeRule
                Resource: "*"

  GitSyncStackExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: iam-lab-gitsync-stack-execution-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: IamLabResourceCreationPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ManageSharedSecret
                Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetSecretValue
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                  - secretsmanager:PutSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*"
              - Sid: GenerateRandomPassword
                Effect: Allow
                Action:
                  - secretsmanager:GetRandomPassword
                Resource: "*"
              - Sid: ReadPublicSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}::parameter/aws/service/*"
              - Sid: ManageIamGroupsAndPolicies
                Effect: Allow
                Action:
                  - iam:CreateGroup
                  - iam:DeleteGroup
                  - iam:GetGroup
                  - iam:UpdateGroup
                  - iam:CreatePolicy
                  - iam:DeletePolicy
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:ListPolicyVersions
                  - iam:CreatePolicyVersion
                  - iam:DeletePolicyVersion
                  - iam:AttachGroupPolicy
                  - iam:DetachGroupPolicy
                  - iam:AttachUserPolicy
                  - iam:DetachUserPolicy
                  - iam:TagPolicy
                Resource: "*"
              - Sid: ManageIamUsers
                Effect: Allow
                Action:
                  - iam:CreateUser
                  - iam:DeleteUser
                  - iam:GetUser
                  - iam:GetRole
                  - iam:CreateRole
                  - iam:UpdateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PassRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:ListRoleTags
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:TagInstanceProfile
                  - iam:UntagInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:UpdateUser
                  - iam:TagUser
                  - iam:UntagUser
                  - iam:AddUserToGroup
                  - iam:RemoveUserFromGroup
                  - iam:CreateLoginProfile
                  - iam:UpdateLoginProfile
                  - iam:DeleteLoginProfile
                  - iam:GetLoginProfile
                  - iam:PutUserPermissionsBoundary
                  - iam:DeleteUserPermissionsBoundary
                Resource: "*"

              - Sid: ManageEc2Resources
                Effect: Allow
                Action:
                  - ec2:AllocateAddress
                  - ec2:ReleaseAddress
                  - ec2:DescribeAddresses
                  - ec2:AssociateAddress
                  - ec2:DisassociateAddress
                  - ec2:CreateInternetGateway
                  - ec2:DeleteInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:DescribeInternetGateways
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:DescribeVpcs
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:DescribeSubnets
                  - ec2:DescribeAvailabilityZones
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:DescribeRouteTables
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:ModifyVpcAttribute
                  - ec2:DescribeVpcAttribute
                  - ec2:DescribeVpcs
                  - ec2:ModifySubnetAttribute
                  - ec2:CreateNatGateway
                  - ec2:DescribeNatGateways
                  - ec2:DeleteNatGateway
                  - ec2:DescribeImages
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:StartInstances
                  - ec2:StopInstances
                  - ec2:RebootInstances
                  - ec2:DescribeInstances
                  - ec2:DescribeInstanceStatus
                  - ec2:ModifyInstanceAttribute
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:DescribeSecurityGroups
                Resource: "*"

              - Sid: CloudFormationStackReadForNestedOperations
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                Resource: "*"

Outputs:
  GitSyncConnectionRoleArn:
    Value: !GetAtt GitSyncConnectionRole.Arn
  GitSyncStackExecutionRoleArn:
    Value: !GetAtt GitSyncStackExecutionRole.Arn